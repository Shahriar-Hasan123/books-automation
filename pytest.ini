[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --html=reports/report.html
    --self-contained-html
    --alluredir=allure-results
    -p no:playwright
markers =
    homepage: Homepage validation tests
    navigation: Book navigation tests
    consistency: Data consistency tests
    broken_links: Broken link tests
    images: Image validation tests